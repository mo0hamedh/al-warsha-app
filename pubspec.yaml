name: el_warsha
description: "تطبيق الورشة لإدارة المهام"
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # مكتبات Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  google_sign_in: ^6.2.2
  
  # مكتبات إضافية
  provider: ^6.1.5
  go_router: ^17.0.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  uuid: ^4.5.3
  confetti: ^0.8.0
  google_fonts: ^6.3.2
  shared_preferences: ^2.5.3
  fl_chart: ^0.69.0
  url_launcher: ^6.3.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^19.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  dotted_border: ^2.1.0
  flutter_timezone: ^5.0.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FF6A00"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/fonts/

  fonts:
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf


